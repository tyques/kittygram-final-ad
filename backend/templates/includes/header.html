<header class="header">
    <div class="container header-content">
        <a href="{% url 'projects:list' %}" class="logo">TeamFinder</a>
        
        <nav class="nav">
            {% if user.is_authenticated %}
                <a href="{% url 'projects:create' %}" class="btn btn-primary">Create Project</a>
                <a href="{% url 'projects:favorites' %}" class="nav-link">Favorites</a>
                <a href="{% url 'users:list' %}" class="nav-link">Users</a>
                
                <div class="user-menu">
                    <span class="user-name">{{ user.surname }} {{ user.name }}</span>
                    <div class="dropdown">
                        <a href="{% url 'users:detail' user.id %}" class="dropdown-item">Profile</a>
                        <a href="{% url 'users:edit' user.id %}" class="dropdown-item">Edit Profile</a>
                        <a href="{% url 'users:change_password' user.id %}" class="dropdown-item">Change Password</a>
                        <a href="{% url 'users:logout' %}" class="dropdown-item">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'users:login' %}" class="btn btn-secondary">Login</a>
                <a href="{% url 'users:register' %}" class="btn btn-primary">Register</a>
            {% endif %}
        </nav>
    </div>
</header>
